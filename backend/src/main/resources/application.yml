spring:
  application:
    name: data-scope-demo
  datasource:
    url: jdbc:h2:mem:data_scope_demo;MODE=MYSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always

server:
  port: 8080

logging:
  level:
    com.example.datascope: INFO
